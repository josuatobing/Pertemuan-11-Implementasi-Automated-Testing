# Konfigurasi Netlify untuk frontend React (folder frontend/).
#
# PENTING setelah deploy backend di Koyeb:
# ganti kedua "https://GANTI-DENGAN-URL-KOYEB.koyeb.app" di bawah dengan URL
# public service Koyeb kamu (contoh: https://simple-lms-josua.koyeb.app),
# lalu commit + push — Netlify akan redeploy otomatis.
#
# Redirect /api dan /media di-proxy ke backend (status 200 = proxy, bukan
# redirect browser), meniru proxy Vite saat dev — jadi kode frontend tidak
# perlu tahu URL backend dan bebas masalah CORS/cookie.

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://GANTI-DENGAN-URL-KOYEB.koyeb.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/media/*"
  to = "https://GANTI-DENGAN-URL-KOYEB.koyeb.app/media/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
