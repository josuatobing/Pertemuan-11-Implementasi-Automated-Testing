# Konfigurasi Netlify untuk frontend React (folder frontend/).
#
# Backend di-hosting di PythonAnywhere (free tier, SQLite, always-on).
# Redirect /api dan /media di-proxy ke backend (status 200 = proxy, bukan
# redirect browser), meniru proxy Vite saat dev — jadi kode frontend tidak
# perlu tahu URL backend dan bebas masalah CORS/cookie.

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://josuatobing.pythonanywhere.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/media/*"
  to = "https://josuatobing.pythonanywhere.com/media/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
